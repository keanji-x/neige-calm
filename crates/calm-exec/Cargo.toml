# calm-exec ‚Äî execution contracts (issue #679, PR1).
#
# Traits ONLY: WorkerProvider, the reaction seam (agent‚Üítruth decision
# writes), the observation sink (kernel‚Üíagent delivery). No implementations
# ‚Äî FakeProvider/FakeRoot are PR5, the real providers move in behind these
# traits in PR6.
#
# HARD RULE: depends only on calm-types (+ async-trait for runtime-agnostic
# async traits). NO sqlx, NO axum, NO tokio ‚Äî this is the compile firewall
# between the kernel and the providers.
[package]
name = "calm-exec"
version = "0.1.0"
edition = "2024"

[dependencies]
calm-types = { path = "../calm-types" }

# Runtime-agnostic async trait methods. async-trait boxes the futures and
# carries no executor ‚Äî the issue's "no tokio" rule explicitly allows it.
async-trait = "0.1"

serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
calm-truth-test-harness = { path = "../calm-truth-test-harness" }

tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
