# Runtime-only docker stack. Binary + web bundle are built on the host
# (see Makefile); the containers just run them. This keeps iteration fast
# and lets calm-server reach the host's $HOME and repo path via bind mounts,
# so terminals/sessions/plugins see the same filesystem they would if you ran
# the binary directly.
#
# Quick start:
#   scripts/docker-up.sh                # builds binary + web, then `up -d`
#   open http://localhost:8080/
#
# Override ports / mounts via .env (see .env.example).
#
# ## Networking
#
# Only nginx publishes a host port. The server stays on the compose bridge
# network and listens on an internal port; nginx reaches it as `server:4041`.
# Outbound traffic that needs the user's host-side proxy should point at
# `host.docker.internal:<proxy port>`, provided by the server extra_hosts
# entry below.

services:
  server:
    # Host is Debian bookworm + glibc 2.36; the slim image matches, so the
    # natively-compiled binary just runs. If you cross-compile or upgrade
    # the host distro, bump this tag accordingly.
    image: debian:bookworm-slim
    init: true
    # Let the container and child processes reach host services such as the
    # developer's HTTP proxy via host.docker.internal.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Run as the host user so files written under $HOME keep correct
    # ownership when you read them back from the host.
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: ${HOME}
    environment:
      HOME: ${HOME}
      USER: ${USER:-calm}
      # Internal-only API port. The host reaches it through nginx at
      # /api; only nginx publishes CALM_PORT.
      CALM_LISTEN: ${CALM_LISTEN:-0.0.0.0:4041}
      # Dev defaults are isolated inside this container on a tmpfs so docker
      # dev does not share DBs, PTY sockets, app-server sockets, or codex homes
      # with cargo-run dev or another worktree. `docker compose down` removes
      # the container and its tmpfs state.
      CALM_DB_URL: ${CALM_DB_URL:-sqlite:///var/lib/neige-calm/calm.db?mode=rwc}
      CALM_DATA_DIR: ${CALM_DATA_DIR:-/var/lib/neige-calm/data}
      CALM_PLUGINS_DATA_DIR: ${CALM_PLUGINS_DATA_DIR:-/var/lib/neige-calm/plugins-data}
      CALM_ALLOWED_ORIGIN: http://localhost:${CALM_PORT:-4041}
      # Issue #189 — auth. `CALM_DEV_AUTOLOGIN` defaults to `false` so a
      # `make dev` of this stack on an exposed origin (LAN, VPS, tailnet,
      # accidental 0.0.0.0 bind) does NOT silently disable the login gate.
      # The cost is that out-of-the-box `make dev` now requires a password —
      # we provide a known dev default below (`owner` / `dev`) so the
      # login page still works without anyone having to write a `.env`
      # first. Override either via .env. To bypass LoginPage entirely
      # (single-user loopback workflows), set `CALM_DEV_AUTOLOGIN=true` in
      # .env — see .env.example for the warning about network-reachable
      # instances.
      CALM_DEV_AUTOLOGIN: ${CALM_DEV_AUTOLOGIN:-false}
      CALM_AUTH_USERNAME: ${CALM_AUTH_USERNAME:-owner}
      CALM_AUTH_PASSWORD: ${CALM_AUTH_PASSWORD:-dev}
      RUST_LOG: ${RUST_LOG:-info,calm_server=debug}
      # Codex CLI binary. Host install path is the musl static binary
      # under /usr/local/lib/node_modules/@openai/codex/... — we bind-mount
      # it into the container as /usr/local/bin/codex (see volumes below).
      # Override CALM_CODEX_BIN in .env to point at a different location.
      CALM_CODEX_BIN: ${CALM_CODEX_BIN:-codex}
      # Outbound HTTP proxy. In bridge networking, 127.0.0.1 is the server
      # container, so the default points at the host gateway alias.
      # NO_PROXY keeps loopback traffic (e.g. codex hook bridge →
      # /internal/codex/hook on 127.0.0.1) off the proxy.
      HTTP_PROXY: ${CALM_CONTAINER_HTTP_PROXY:-http://host.docker.internal:10809}
      HTTPS_PROXY: ${CALM_CONTAINER_HTTPS_PROXY:-http://host.docker.internal:10809}
      NO_PROXY: ${CALM_CONTAINER_NO_PROXY:-localhost,127.0.0.1,::1}
      http_proxy: ${CALM_CONTAINER_HTTP_PROXY:-http://host.docker.internal:10809}
      https_proxy: ${CALM_CONTAINER_HTTPS_PROXY:-http://host.docker.internal:10809}
      no_proxy: ${CALM_CONTAINER_NO_PROXY:-localhost,127.0.0.1,::1}
      # Slim image has no CA bundle; codex's rustls TLS client otherwise
      # errors "no native root CA certificates found" and retries forever.
      # Point it at the host bundle we mount below.
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
      SSL_CERT_DIR: /etc/ssl/certs
    volumes:
      # Host CA bundle — needed because debian:bookworm-slim ships without
      # ca-certificates and codex/reqwest/rustls all need root certs to
      # validate TLS endpoints (OpenAI, GitHub, proxies). Read-only.
      - /etc/ssl/certs:/etc/ssl/certs:ro
      # Codex "managed" hooks policy — auto-trusted across every spawn so
      # we never see the /hooks trust prompt. User-level hooks.json would
      # otherwise require manual approval the first time codex sees them.
      - ./docker/codex-requirements.toml:/etc/codex/requirements.toml:ro
      # The release binaries. Built on the host by `make build`. calm-server
      # looks for calm-session-daemon as a sibling of its own exe (see
      # state.rs::resolve_session_daemon_bin), so both land in /usr/local/bin.
      - ${CALM_BIN:-./target/release/calm-server}:/usr/local/bin/calm-server:ro
      - ${CALM_DAEMON_BIN:-./target/release/calm-session-daemon}:/usr/local/bin/calm-session-daemon:ro
      # Codex hook bridge. calm-server's CodexClient looks for it next
      # to its own binary (see state.rs::resolve_codex_bridge_bin) so it
      # lands at the same /usr/local/bin path.
      - ${CALM_CODEX_BRIDGE_BIN:-./target/release/neige-codex-bridge}:/usr/local/bin/neige-codex-bridge:ro
      # Issue #236 followup — the kernel-as-MCP-server bridge. Codex inside
      # the container spawns this binary per the `[mcp_servers.calm].command`
      # baked into each per-card config.toml. `resolve_mcp_stdio_shim_bin`
      # (see state.rs) looks for it as a sibling of calm-server's exe and
      # falls back to a bare-name PATH lookup; mounting at /usr/local/bin
      # makes both paths resolve. Without this mount the codex MCP client
      # exits with "os error 2" on every spec/worker card spawn — the
      # narrow #236 sync-spawn fix doesn't surface that because it only
      # awaits the daemon socket, not the codex MCP handshake.
      - ${CALM_MCP_SHIM_BIN:-./target/release/neige-mcp-stdio-shim}:/usr/local/bin/neige-mcp-stdio-shim:ro
      # Codex CLI. The host npm install drops a musl static binary at
      # ${CALM_CODEX_HOST_BIN}; we mount it inside as a bare `codex` so
      # `Command::new("codex")` resolves via PATH. Set CALM_CODEX_HOST_BIN
      # in .env if your install path differs.
      - ${CALM_CODEX_HOST_BIN:-/usr/local/lib/node_modules/@openai/codex/node_modules/@openai/codex-linux-x64/vendor/x86_64-unknown-linux-musl/codex/codex}:/usr/local/bin/codex:ro
      # Host home, same path inside the container. calm-server's data dir,
      # plugin install dir, and plugin state dir all default under here, so
      # no extra env wiring is needed.
      - ${HOME}:${HOME}
      # The repo lives outside $HOME on this machine (/mnt/data2/...) with a
      # symlink in $HOME. Mount the real path too so the symlink resolves.
      # Safe no-op if you don't have /mnt/data2; remove or change via .env.
      - ${CALM_EXTRA_MOUNT:-/mnt/data2}:${CALM_EXTRA_MOUNT:-/mnt/data2}
    tmpfs:
      # Container-local dev state. The uid/gid options keep it writable while
      # the process still runs as the host user for mounted HOME/repo paths.
      - ${CALM_CONTAINER_STATE_DIR:-/var/lib/neige-calm}:uid=${UID:-1000},gid=${GID:-1000},mode=700
    # No host port mapping: nginx is the only published entrypoint.
    command: ["calm-server"]
    restart: unless-stopped

  web:
    # Same idea: nginx just serves the pre-built bundle and reverse-proxies
    # /api → server. No build step in docker. nginx listens on 8080 inside
    # the container; we publish that as CALM_PORT on the host. 4040 is
    # reserved for host prod, so docker dev defaults to 4041.
    image: nginx:1.27-alpine
    # `depends_on` without a condition just orders startup; nginx will retry
    # upstream connections while the server finishes booting.
    depends_on:
      - server
    volumes:
      - ${CALM_WEB_DIST:-./web/dist}:/usr/share/nginx/html/calm:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/calm.conf:ro
    ports:
      - "${CALM_PORT:-4041}:8080"
    restart: unless-stopped
