# Single-origin reverse proxy in front of calm-server.
#
# Layout mirrors `web/vite.config.ts`:
#   - vite builds with base: '/calm/', so JS/CSS asset URLs are absolute under
#     /calm/. We serve `dist/` mounted at /calm/.
#   - vite dev proxies '/api' (incl. WS) to localhost:4040. nginx does the
#     same to the calm-server container.
# Single-origin means the browser never makes a cross-origin request, so
# CORS preflights don't kick in regardless of CALM_ALLOWED_ORIGIN.

# WebSocket upgrade plumbing. conf.d/*.conf is included inside http{}, so a
# top-level `map` here is valid.
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 8080 default_server;
  server_name _;

  # Big enough for plugin install bodies (manifest + small assets via the
  # local_path source variant currently fits in well under this, but raise
  # if a future bundle source posts archives through here).
  client_max_body_size 32m;

  # When the container's published port differs from `listen 8080`, nginx
  # would otherwise rewrite a redirect's Location to `http://host:8080/...`,
  # which 404s the browser. Emit relative Locations and let the UA resolve
  # against the original Host header.
  absolute_redirect off;
  port_in_redirect off;

  # / → /calm/ so the bare host lands in the app without a 404.
  location = / {
    return 302 /calm/;
  }

  # Static SPA. `root` (not `alias`) keeps the location prefix in $uri so
  # `try_files` resolves predictably; the SPA fallback covers client-side
  # routes that hit a non-existent path.
  root /usr/share/nginx/html;
  location /calm/ {
    try_files $uri $uri/ /calm/index.html;
  }

  # Kernel API. Includes the SSE endpoint (/api/events) and the WS endpoint
  # (/api/terminals/:id) — `proxy_buffering off` is required for SSE to
  # actually stream, and the Upgrade headers cover the WS case.
  #
  # Upstream is `host.docker.internal:4041` (not `server:4040`) because the
  # `server` service runs under `network_mode: host` and is no longer
  # reachable on the docker bridge network. We also use 4041 (not 4040)
  # because the `web` container publishes nginx on the host's CALM_PORT
  # (default 4040), so the binary listens on a different port to avoid
  # colliding with that publish. See docker-compose.yml.
  location /api/ {
    proxy_pass http://host.docker.internal:4041;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering off;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
  }
}
