name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: short

jobs:
  rust:
    name: rust (fmt + clippy + build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Free ~20GB (Android SDK / .NET / Haskell / pre-pulled docker images) so the
      # `cargo test --workspace --locked` link stage doesn't intermittently die with
      # `collect2: ld terminated with signal 7 [Bus error]` — tmpfs object-file
      # truncation / ENOSPC at the temp dir under runner disk pressure when linking the
      # many test binaries. Mirrors the `openapi drift` job's mitigation (#634). Keep
      # `tool-cache` (Node) and runner swap; skip slow `large-packages`.
      - name: free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      # Workspace is edition = "2024" → needs Rust >= 1.85.
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          # Shared key so the openapi-drift job (which also builds the
          # workspace via `cargo run --bin emit-openapi`) reuses this cache.
          shared-key: workspace

      - name: cargo fmt --all --check
        run: cargo fmt --all --check

      - name: single migrations/ dir gate (#679 PR2)
        run: |
          count=$(find . -maxdepth 4 -type d -name migrations -not -path './external/*' -not -path './target/*' | wc -l)
          [ "$count" -eq 1 ] && echo "OK: 1 migrations/ directory" || { echo "::error::expected 1 migrations/ directory, found $count"; exit 1; }

      - name: harness raw status UPDATE gate (#679 PR3a)
        run: |
          hits=$(grep -rniE "update[[:space:]]+runtimes" crates/calm-server/src/harness crates/calm-server/src/operation/spec_harness_start_adapter.rs crates/calm-server/src/operation/spec_harness_shutdown_adapter.rs | wc -l)
          [ "$hits" -eq 0 ] && echo "OK: no raw runtimes UPDATE in harness paths" || { echo "::error::raw UPDATE runtimes survives in harness paths ($hits)"; grep -rniE "update[[:space:]]+runtimes" crates/calm-server/src/harness crates/calm-server/src/operation/spec_harness_start_adapter.rs crates/calm-server/src/operation/spec_harness_shutdown_adapter.rs; exit 1; }

      - name: PR9b-iv runtimes retirement ratchet (#758)
        run: |
          set -euo pipefail
          if rg -n "FROM runtimes\b|INTO runtimes\b|UPDATE runtimes\b|DELETE FROM runtimes\b" crates/ --type=rust --type=sql --glob '!crates/calm-truth/migrations/**'; then
            echo "::error::runtimes table SQL survived outside historical migrations"
            exit 1
          fi
          if rg -n "worker_sessions_parity|NEIGE_ASSERT_WORKER_SESSIONS_PARITY_ON_BOOT|worker_sessions_parity_divergences|worker-session-parity-drop" crates/; then
            echo "::error::worker_sessions parity sweep scaffolding survived"
            exit 1
          fi
          if rg -n "runtime_(start|supersede|set_status_for_card|complete_for_card|status_flip|finalize|lease_acquire|lease_release|restore_from_superseded|backfill_worker_sessions_from_runtimes)_tx\b" crates/ --type=rust; then
            echo "::error::retired runtime write transaction helper survived"
            exit 1
          fi
          echo "OK: PR9b-iv runtimes retirement ratchet clean"

      # Complements the PR9b-iv ratchet (which forbids only the bare,
      # unquoted FROM/INTO/UPDATE/DELETE runtimes verbs). The `runtimes`
      # table was dropped in migration 0055 and must never return. This
      # step closes the two holes the verb-list ratchet leaves: (a) DDL/JOIN
      # it never names (CREATE TABLE / CREATE INDEX ... ON / ALTER TABLE /
      # REPLACE INTO / JOIN), and (b) QUOTED identifiers `"runtimes"` that
      # slip past every \b-anchored pattern. The 0055 drop-regression test
      # legitimately re-creates the table to prove the drop, so it is the
      # single scoped exclusion (alongside historical migrations).
      - name: dropped runtimes table reintroduction ratchet (#679 PR10)
        run: |
          set -euo pipefail
          EXCL=(--type=rust --type=sql
                --glob '!crates/calm-truth/migrations/**'
                --glob '!crates/calm-server/tests/migration_0055_drop_runtimes.rs')
          # (a) DDL / JOIN / REPLACE — bare or quoted — that the verb-list ratchet misses
          if rg -niP '\b(create\s+(temp(orary)?\s+)?table|alter\s+table|replace\s+into|join|create\s+(unique\s+)?index\s+\w+\s+on)\s+(if\s+not\s+exists\s+)?"?runtimes"?\b' crates/ "${EXCL[@]}"; then
            echo "::error::dropped 'runtimes' table reintroduced via DDL/JOIN/REPLACE (migration 0055 dropped it)"
            exit 1
          fi
          # (b) quoted-identifier DML that bypasses the existing \b-anchored FROM/INTO/UPDATE/DELETE gate
          if rg -niP '\b(from|update|delete\s+from|insert\s+into)\s+"runtimes"' crates/ "${EXCL[@]}"; then
            echo "::error::dropped 'runtimes' table reintroduced via quoted-identifier SQL"
            exit 1
          fi
          echo "OK: no dropped-runtimes-table reintroduction (quoted/DDL/JOIN holes closed)"

      - name: no parallel operation-event entrance (#679 PR4)
        run: |
          hits=$(grep -rnE "event_append_for_operation_tx|events_append_for_operation_tx" crates/ | wc -l)
          [ "$hits" -eq 0 ] && echo OK || { echo "::error::parallel operation-event entrance survives"; grep -rnE "event_append_for_operation_tx|events_append_for_operation_tx" crates/; exit 1; }

      - name: token authority audit gate (#679 PR7b-i)
        run: |
          set -euo pipefail
          grep -q "session_get_by_active_token_hash" crates/calm-server/src/mcp_server/handshake.rs \
            || { echo "::error::handshake must authenticate through active worker_sessions"; exit 1; }
          if grep -n "card_mcp_token_lookup_by_hash" crates/calm-server/src/mcp_server/handshake.rs; then
            echo "::error::handshake must not authenticate through card_mcp_tokens"
            exit 1
          fi
          if grep -nE "\.card_get\(|\.card_role_get\(" crates/calm-server/src/mcp_server/transport.rs; then
            echo "::error::transport auth path must not resolve per-call identity through card_get/card_role_get"
            exit 1
          fi
          echo "OK: MCP token authority is session-bound and transport per-call auth is session-derived"

      # Soft backstop alongside the cargo-feature gate on
      # `AppState::raw_repo` (see `state.rs` and design doc §1.4.1).
      # The compile gate already blocks production builds from reaching
      # raw sync-domain writes; if a contributor turns on
      # `--features fixtures` for a production module they could
      # re-expose it. This grep catches that case at CI time. Tests
      # under `tests/*.rs` are the legitimate consumers and are not
      # scanned.
      - name: sanity — no raw_repo escape in production
        run: |
          set -euo pipefail
          if grep -rn "raw_repo" \
              crates/calm-server/src/routes/ \
              crates/calm-server/src/plugin_host/ \
              crates/calm-server/src/card_fsm.rs \
              crates/calm-server/src/terminal_sweeper.rs \
              crates/calm-server/src/replay.rs \
              2>/dev/null; then
            echo "::error::raw_repo() used in production module — must go through write_with_event"
            exit 1
          fi
          echo "OK: no raw_repo escape in production"

      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: cargo clippy --workspace --all-targets --features calm-server/codex-e2e -- -D warnings

      - name: cargo build --workspace --locked
        run: cargo build --workspace --locked --features calm-server/codex-e2e

      - name: cargo test --workspace --locked
        # Feature enabled for compile-check coverage; codex-e2e tests self-skip when no codex binary is discoverable, the default in GHA runners.
        run: cargo test --workspace --locked --features calm-server/codex-e2e

      # #679 PR0-D — migration-replay gate, made explicit so a failure is
      # attributable at a glance. Re-runs the (already compiled, ~10s)
      # snapshot replay harness: every per-version stage→seed→replay stop
      # must converge on the fresh-DB schema. The external-snapshot half
      # self-skips while NEIGE_SNAPSHOT_DB is unset in CI; point it at a
      # sanitized prod snapshot to extend the gate to real data.
      - name: migration replay gate (#679 PR0-D)
        run: cargo test -p calm-server --locked --test migration_replay_harness

  frozen-vectors:
    name: frozen security vectors freeze gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the commit-range walk below can diff against the
          # PR base / push predecessor.
          fetch-depth: 0

      # Issue #679 PR0-A — the gate-denial vector corpus under
      # crates/calm-server/tests/vectors/ is FROZEN characterization data:
      # it pins the role-gate decision matrix so a future gate rewrite
      # (#679 PR7) must pass the same files unmodified instead of rewriting
      # its own tests. Any commit that touches the dir must carry a
      # `FROZEN-VECTOR-CHANGE:` rationale in its message — same spirit as
      # the raw_repo grep gate above, but keyed on commit messages so the
      # change is a conscious, auditable decision.
      - name: vectors dir changes require FROZEN-VECTOR-CHANGE rationale
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail
          VEC_DIR='crates/calm-server/tests/vectors/'
          # Resolve a usable base: PR base sha or push `before`; fall back to
          # the first parent when unavailable (branch creation pushes report
          # `before` as 40 zeros).
          if [ -z "${BASE_SHA:-}" ] || ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            BASE_SHA=$(git rev-parse HEAD~1)
          fi
          if git diff --quiet "$BASE_SHA"...HEAD -- "$VEC_DIR"; then
            echo "OK: frozen vectors untouched"
            exit 0
          fi
          # Vectors changed — every commit in range whose diff touches the
          # dir must carry the rationale marker in its full message.
          bad=0
          for sha in $(git log --format=%H "$BASE_SHA"..HEAD -- "$VEC_DIR"); do
            if ! git log -1 --format=%B "$sha" | grep -q 'FROZEN-VECTOR-CHANGE:'; then
              echo "::error::commit $sha touches $VEC_DIR without a 'FROZEN-VECTOR-CHANGE:' rationale in its message"
              git log -1 --format='  %h %s' "$sha"
              bad=1
            fi
          done
          if [ "$bad" -ne 0 ]; then
            exit 1
          fi
          echo "OK: all vector-touching commits carry FROZEN-VECTOR-CHANGE:"

  web:
    name: web (build + test + a11y)
    runs-on: ubuntu-latest
    # a11y suite locally takes ~10s; cold cargo build for the replay binary
    # is the dominant factor (~25-60s with cache, longer cold). 20 minutes
    # is comfortable headroom without masking a genuinely stuck run.
    timeout-minutes: 20
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      # Rust toolchain + cache — needed so the Playwright `replay-setup`
      # project (issue #56 slice 5) can `cargo run --bin replay --serve`.
      # See `web/e2e/_setup/replay-server.setup.ts`. Reuses the shared
      # workspace cache populated by the `rust` job above.
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace

      # TODO(#2): drop --legacy-peer-deps once the TypeScript downgrade lands
      # on main. The current pin (`typescript: ~6.0.2`) is ahead of what
      # several @types/* packages accept, so a strict `npm ci` rejects the
      # tree on peer-dependency grounds. --legacy-peer-deps matches the
      # behavior developers use locally today.
      - name: npm ci
        run: npm ci --legacy-peer-deps

      - name: npm run build
        run: npm run build

      - name: npm run test
        run: npm run test

      # Pre-build the replay binary so the cargo invocation inside the
      # Playwright setup hook (`replay-server.setup.ts`) is effectively a
      # no-op rather than a cold compile that may bump up against the 60s
      # READY_TIMEOUT_MS banner-wait. --locked matches the `rust` job.
      #
      # `--features fixtures` (#682): the replay [[bin]] declares
      # `required-features = ["fixtures"]` for its `/dev/force-spec-phase`
      # hook; the setup hook passes the same flag so this stays a cache hit.
      - name: cargo build --bin replay
        working-directory: .
        run: cargo build -p calm-server --bin replay --features fixtures --locked

      # Playwright browsers aren't bundled with `@playwright/test`; the
      # binary must be downloaded once per runner. `--with-deps` also
      # installs the system libraries chromium needs on ubuntu-latest.
      - name: install playwright chromium
        run: npx playwright install --with-deps chromium

      # The a11y gate — issue #56 acceptance criterion 5. Runs
      # `lint && a11y:e2e && a11y:color` (#690): `a11y:e2e` is the whole
      # `a11y` Playwright project (testMatch `a11y-*.spec.ts` — keyboard,
      # axe, spec-chat, wave/cove lifecycle + ops, cwd-resolve, deep-link,
      # sidebar-delete, trace-smoke, #177 theme-toggle), and `a11y:color`
      # is the `color-anchor` project (color-system-anchor snapshot). The
      # replay binary + Vite dev server are spawned automatically by
      # playwright.config.ts (`replay-setup` project + `webServer` block).
      - name: npm run a11y
        run: npm run a11y
        env:
          CI: "true"

      # Surfaces the Playwright HTML report on failure so the user can
      # download traces / screenshots from the run page instead of
      # repro'ing locally.
      - name: upload playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            web/playwright-report/
            web/test-results/
          retention-days: 7
          if-no-files-found: ignore

  chromium-e2e:
    name: chromium e2e (playwright + docker stack)
    # Pinned to ubuntu-22.04 (GLIBC 2.35) so the natively-compiled
    # calm-server binary loads inside the `debian:bookworm-slim` runtime
    # image used by docker-compose.yml (GLIBC 2.36 — forward-compatible
    # with anything <= 2.35). `ubuntu-latest` currently resolves to
    # ubuntu-24.04 (GLIBC 2.39), which produces a binary whose .dynstr
    # references GLIBC_2.39 symbols and fails to load against bookworm's
    # libc with `version GLIBC_2.39 not found`. See docker-compose.yml:24
    # for the matching runtime-image rationale. Revisit this pin when
    # `debian:bookworm-slim` is bumped forward, or when ubuntu-22.04
    # nears its April-2027 EOL — whichever comes first.
    runs-on: ubuntu-22.04
    # Release rust build dominates (~3-6min warm, longer cold), then docker
    # compose up + 2 specs (~30s each with retries). 30 minutes is comfortable
    # headroom; bump if cold-cache cargo build pushes us over.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # Reuse the shared workspace cargo cache populated by the `rust` job.
      # The rust job builds debug; this job needs release binaries (`make
      # dev` runs `cargo build --release` for calm-server /
      # neige-codex-bridge). Sharing the registry + git index across debug
      # and release is still a substantial speedup vs. cold cache.
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      # See note above on --legacy-peer-deps in the `web` job.
      - name: npm ci
        working-directory: web
        run: npm ci --legacy-peer-deps

      # Build release binaries + web bundle the way `make dev` expects them.
      # We don't call `make dev` directly here so the cargo + npm steps stay
      # visible in the GitHub Actions log timeline. Issue #236 followup
      # added `neige-mcp-stdio-shim` to the list — docker-compose.yml bind-
      # mounts it into /usr/local/bin so codex inside the container can
      # spawn the kernel-as-MCP-server bridge per spec/worker card. The
      # chromium-e2e specs don't exercise codex today, but the docker
      # compose `up` step uses the same compose file as `make dev` and
      # will fail trying to bind-mount a non-existent host path.
      - name: cargo build --release (server + codex bridge + mcp-stdio shim + proc-supervisor)
        # Issue #388 Phase 1 — `calm-proc-supervisor` is bind-mounted by
        # docker-compose.yml into the calm-server container so calm-server can
        # talk to it over a control UDS for every terminal spawn. Without it
        # in the release build, docker-compose mounts a non-existent host path
        # and the container shell aborts before `calm-server listening`.
        run: cargo build --release -p calm-server -p calm-codex-bridge -p neige-mcp-stdio-shim -p calm-proc-supervisor --bin calm-server --bin neige-codex-bridge --bin neige-mcp-stdio-shim --bin calm-proc-supervisor --locked

      - name: npm run build (web bundle for nginx)
        working-directory: web
        run: npm run build

      # Stub the codex CLI mount so docker compose doesn't fail trying to
      # bind-mount a host path that exists only on developer machines. The
      # chromium specs (`golden-path`, `wave-create`) don't exercise codex,
      # so any executable file will do — we point at /bin/true. Same idea
      # for the optional /mnt/data2 mount and the HTTP proxy defaults.
      - name: write CI .env overrides
        run: |
          cat > .env <<'EOF'
          CALM_CODEX_HOST_BIN=/bin/true
          CALM_EXTRA_MOUNT=/tmp
          CALM_PORT=4041
          CALM_DEV_AUTOLOGIN=true
          HTTP_PROXY=
          HTTPS_PROXY=
          NO_PROXY=*
          http_proxy=
          https_proxy=
          no_proxy=*
          EOF

      # `make dev` would re-trigger the cargo + npm builds; we've done both
      # already, so call `make up` (which skips rebuild) plus the `dirs`
      # target it depends on. Run as the current runner UID/GID so the
      # host-mounted $HOME stays writable.
      - name: docker compose up
        run: make up

      - name: wait for stack
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:4041/api/version > /dev/null; then
              echo "Stack is up after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Stack failed to come up within 60s"
          docker compose ps
          docker compose logs
          exit 1

      - name: install playwright chromium
        working-directory: web
        run: npx playwright install --with-deps chromium

      # `playwright.config.ts` already bumps `retries` to 2 when CI=true,
      # so the bare `--project=chromium` invocation inherits that.
      - name: playwright chromium project
        working-directory: web
        env:
          CI: "true"
        run: npx playwright test --project=chromium

      - name: upload playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-chromium-report
          path: |
            web/playwright-report/
            web/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: dump docker logs on failure
        if: failure()
        run: docker compose logs --no-color || true

      # `if: always()` so we tear the stack down even when the playwright
      # step fails — keeps the runner clean for retries and avoids leaking
      # containers that hold ports across re-runs.
      - name: docker compose down
        if: always()
        run: make stop

  stack-e2e-tier-1:
    name: stack e2e (tier 1)
    # Match the chromium stack job's runner pin so the host-built release
    # binaries remain ABI-compatible with the bookworm-slim runtime image.
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # Same cache key as the chromium e2e job: debug/release targets differ,
      # but the shared registry + git index still avoid a cold dependency run.
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      # See note above on --legacy-peer-deps in the `web` job.
      - name: npm ci
        working-directory: web
        run: npm ci --legacy-peer-deps

      # Match Makefile's `build` cargo rule so `make dev` inside e2e/run.sh
      # finds every release binary it expects instead of compiling cold.
      - name: cargo build --release (make dev binaries)
        run: cargo build --manifest-path "$PWD/Cargo.toml" --release -p calm-server -p calm-codex-bridge -p neige-app -p neige-mcp-stdio-shim -p calm-proc-supervisor -p neige-cli --bin calm-server --bin neige-codex-bridge --bin neige-app --bin neige-mcp-stdio-shim --bin calm-proc-supervisor --bin neige

      - name: npm run build (web bundle for nginx)
        working-directory: web
        run: npm run build

      # Stub the codex CLI mount so docker compose has an existing host path
      # for tier-1 cases that do not exercise live Codex work.
      - name: write CI .env overrides
        run: |
          cat > .env <<'EOF'
          CALM_CODEX_HOST_BIN=/bin/true
          CALM_EXTRA_MOUNT=/tmp
          CALM_DEV_AUTOLOGIN=true
          HTTP_PROXY=
          HTTPS_PROXY=
          NO_PROXY=*
          http_proxy=
          https_proxy=
          no_proxy=*
          EOF

      - name: stack e2e tier 1
        run: ./e2e/run.sh --tier 1

      - name: upload stack e2e artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: stack-e2e-tier-1-artifacts
          path: e2e-artifacts/
          retention-days: 7
          if-no-files-found: ignore

  openapi-drift:
    name: openapi drift (cargo emit-openapi == checked-in spec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Issue #634 — `npm run gen:api` builds three test-profile binaries
      # (`cargo test export_bindings_` for calm-types / calm-session /
      # calm-editor; #679 PR1 moved the WS-event bindings source from
      # calm-server to calm-types) plus `cargo run --bin emit-openapi`,
      # all on the shared
      # `workspace` rust-cache. Peak target/ + cache exceeds the ~14GB free
      # that `ubuntu-latest` ships with, and the link stage was repeatedly
      # dying with SIGBUS (tmpfs object-file truncation) or ENOSPC at the
      # temp dir. Pruning Android SDK / .NET / Haskell / pre-pulled docker
      # images frees ~20GB+ and gives a stable link stage. Keep
      # `tool-cache` so the `actions/setup-node` step below still finds a
      # pre-cached Node 20; skip `large-packages` (slow, unneeded) and
      # `swap-storage` (don't shrink runner swap on a tight job).
      - name: free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          # Share the cache with the `rust` job — same workspace, same lockfile.
          shared-key: workspace

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      # See note above on --legacy-peer-deps.
      - name: npm ci
        working-directory: web
        run: npm ci --legacy-peer-deps

      # Acceptance criterion for #634: ≥5GB free at the link stage.
      # Printed immediately before the cargo build so the run log shows the
      # headroom the linker actually sees.
      - name: df -h (pre-gen:api headroom check)
        run: df -h /

      - name: regenerate OpenAPI spec + TS types
        working-directory: web
        run: npm run gen:api

      - name: fail if committed spec / types are stale
        run: |
          git diff --exit-code -- web/src/api/openapi.json web/src/api/generated.ts web/src/api/generated-terminal.ts web/src/api/generated-events.ts web/src/editor/types/
