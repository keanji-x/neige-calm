name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: short

jobs:
  rust:
    name: rust (fmt + clippy + build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Workspace is edition = "2024" → needs Rust >= 1.85.
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          # Shared key so the openapi-drift job (which also builds the
          # workspace via `cargo run --bin emit-openapi`) reuses this cache.
          shared-key: workspace

      - name: cargo fmt --all --check
        run: cargo fmt --all --check

      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo build --workspace --locked
        run: cargo build --workspace --locked

      - name: cargo test --workspace --locked
        run: cargo test --workspace --locked

  web:
    name: web (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      # TODO(#2): drop --legacy-peer-deps once the TypeScript downgrade lands
      # on main. The current pin (`typescript: ~6.0.2`) is ahead of what
      # several @types/* packages accept, so a strict `npm ci` rejects the
      # tree on peer-dependency grounds. --legacy-peer-deps matches the
      # behavior developers use locally today.
      - name: npm ci
        run: npm ci --legacy-peer-deps

      - name: npm run build
        run: npm run build

      - name: npm run test
        run: npm run test

  openapi-drift:
    name: openapi drift (cargo emit-openapi == checked-in spec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          # Share the cache with the `rust` job — same workspace, same lockfile.
          shared-key: workspace

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      # See note above on --legacy-peer-deps.
      - name: npm ci
        working-directory: web
        run: npm ci --legacy-peer-deps

      - name: regenerate OpenAPI spec + TS types
        working-directory: web
        run: npm run gen:api

      - name: fail if committed spec / types are stale
        run: |
          git diff --exit-code -- web/src/api/openapi.json web/src/api/generated.ts
